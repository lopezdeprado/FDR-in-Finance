name: CI FDR

on:
  push

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Run tests with coverage
        run: uv run --with pytest --with pytest-cov pytest tests/ --cov --cov-report=term-missing
