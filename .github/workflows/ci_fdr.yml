name: CI FDR

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install pytest and pytest-cov
        run: uv pip install pytest pytest-cov

      - name: Run tests with coverage
        run: uv run --with pytest --with pytest-cov pytest tests/ --cov --cov-report=term-missing
